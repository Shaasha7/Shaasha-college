<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Feedback Form</title>
    <link rel="stylesheet" href="faculty-feedback.css">
</head>
<body>

<div class="feedback-container">

    <h1>Faculty Feedback Form</h1>

    <form>

        <div class="form-group">
            <label>Faculty Id</label>
            <input type="text" placeholder="Register Number" required>
        </div>

        <div class="form-group">
            <label>Faculty Name</label>
            <input type="text" placeholder="Name" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" placeholder="Department" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Phone Number" required>
        </div>

        <div class="form-group">
            <label>Feedback Message</label>
            <textarea placeholder="Write your feedback here..." required></textarea>
        </div>

        <button type="submit">Submit</button>

    </form>

</div>
<script src="script.js"></script>
</body>
</html>
