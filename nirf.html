<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>NIRF Ranking</title>

    <link rel="stylesheet" href="nirf.css">

<body>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay">

        </div>

    </section>

    <section class="nirf-section">

        </div>

            <table>

                <thead>

                    <tr>

                </thead>

                <tbody>

                    <tr>

                        <td>2024</td>

                        <td>151 - 200</td>

                    </tr>

                    <tr>

                        <td>2023</td>

                        <td>101 - 150</td>

                    </tr>

                    <tr>

                        <td>2022</td>

                        <td>122</td>

                    </tr>

                    <tr>

                        <td>2021</td>

                        <td>137</td>

                    </tr>

                </tbody>

            </table>

        </div>

    </section>

<script src="include.js"></script>
