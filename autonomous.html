<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Autonomous Status</title>

    <!-- SEO -->
    <meta name="description" content="UGC Autonomous Status details and certificates of validity periods for the institution.">

    <!-- CSS -->
    <link rel="stylesheet" href="autonomous.css">
    <link rel="stylesheet" href="footer.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- HERO -->
<section class="hero">

    <div class="overlay">

        <h1>Autonomous Status</h1>

        <p>University Grants Commission (UGC)</p>

    </div>

</section>

<!-- TABLE -->
<section class="autonomous">

    <div class="title">

        <h2>Autonomous Status Details</h2>

        <div class="line"></div>

    </div>

    <div class="table-box">

        <table>

            <thead>

                <tr>
                    <th>S.No</th>
                    <th>Period of Validity</th>
                    <th>Certificate</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>10 Years (2022–23 to 2031–32)</td>
                    <td>
                        <a href="pdf/autonomous2022.pdf"
                           class="view-btn"
                           target="_blank"
                           aria-label="View Autonomous Certificate 2022 to 2032">
                            <i class="fa-solid fa-eye"></i>
                            View
                        </a>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>5 Years (2017–18 to 2021–22)</td>
                    <td>
                        <a href="pdf/autonomous2017.pdf"
                           class="view-btn"
                           target="_blank"
                           aria-label="View Autonomous Certificate 2017 to 2022">
                            <i class="fa-solid fa-eye"></i>
                            View
                        </a>
                    </td>
                </tr>

                <tr>
                    <td>3</td>
                    <td>6 Years (2011–12 to 2016–17)</td>
                    <td>
                        <a href="pdf/autonomous2011.pdf"
                           class="view-btn"
                           target="_blank"
                           aria-label="View Autonomous Certificate 2011 to 2017">
                            <i class="fa-solid fa-eye"></i>
                            View
                        </a>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<script src="include.js"></script>
<script src="script.js"></script>

</body>
</html>
