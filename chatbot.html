<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAASHA AI Assistant</title>

<link rel="stylesheet" href="chatbot.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">

        <div class="bot-info">
            <img src="images/robot.png" alt="Robot">
            <div>
                <h3>SHAASHA AI</h3>
                <span>Always Online</span>
            </div>
        </div>

    </div>

    <!-- Chat Area -->
    <div class="chat-body" id="chatBody">

        <div class="bot-message">
            👋 Hello! Welcome to Shaasha College of Technology.
            <br><br>
            I'm your AI Assistant.
            <br><br>
            How may I help you today?
        </div>

    </div>

    <!-- Quick Buttons -->

    <div class="quick-buttons">

        <button onclick="sendQuestion('Admissions')">
            Admissions
        </button>

        <button onclick="sendQuestion('Courses')">
            Courses
        </button>

        <button onclick="sendQuestion('Facilities')">
            Facilities
        </button>

        <button onclick="sendQuestion('Contact')">
            Contact
        </button>

    </div>

    <!-- Footer -->

    <div class="chat-footer">

        <input
            type="text"
            id="userInput"
            placeholder="Type your message..."
        >

        <button onclick="sendMessage()">
            ➤
        </button>

    </div>

</div>

<script src="chatbot.js"></script>

</body>
</html>
